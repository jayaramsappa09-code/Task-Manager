<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>TaskFlow</title>

  <link
    rel="stylesheet"
    href="style.css"
  >

</head>

<body>

  <div class="container">

    <h1>TaskFlow</h1>

    <!-- AUTH CARD -->

    <div class="card auth-card">

      <h2>Login / Register</h2>

      <div class="auth-box">

        <input
          type="text"
          id="username"
          placeholder="Username"
        >

        <input
          type="password"
          id="password"
          placeholder="Password"
        >

        <div class="buttons">

          <button id="loginBtn">
            Login
          </button>

          <button id="registerBtn">
            Register
          </button>

          <button id="logoutBtn">
            Logout
          </button>

        </div>

      </div>

    </div>

    <!-- DASHBOARD -->

    <div id="dashboard" style="display:none;">

      <!-- CREATE TASK -->

      <div class="card">

        <h2>Create Task</h2>

        <div class="task-section">

          <input
            type="text"
            id="title"
            placeholder="Task Title"
          >

          <input
            type="text"
            id="description"
            placeholder="Task Description"
          >

          <select id="priority">

            <option value="High">
              High Priority
            </option>

            <option value="Medium">
              Medium Priority
            </option>

            <option value="Low">
              Low Priority
            </option>

          </select>

          <button id="taskBtn">
            Add Task
          </button>

        </div>

      </div>

      <!-- TASK LIST -->

      <div class="card">

        <h2>Your Tasks</h2>

        <div id="taskList"></div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

</body>

</html>
